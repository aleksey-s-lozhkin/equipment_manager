<!DOCTYPE html>
<html>
  <head>
    <title>{% block title %}{{ admin_view.name }} - {{ admin_view.admin.name }}{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Подключаем ЛОКАЛЬНЫЙ Bootstrap -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='font-awesome/css/font-awesome.min.css') }}">

    <style>
      body { background: #f5f7fa; }
      .container-fluid {
        padding-left: 30px !important;
        padding-right: 30px !important;
        max-width: 100% !important;
      }
      .row { margin: 0 !important; }
      .card {
        border-radius: 8px;
        transition: transform 0.2s, box-shadow 0.2s;
        cursor: pointer;
        height: 100%;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      }
      .card-body { padding: 1.5rem; }
      .card-title {
        font-size: 2rem;
        font-weight: 300;
        margin-bottom: 0;
      }
      .card-text {
        color: #6c757d;
        margin: 0;
      }
      .display-4 {
        font-size: 2.5rem;
        font-weight: 300;
      }
      .mb-3 { margin-bottom: 1rem !important; }
      .btn { border-radius: 4px; margin: 3px; }
      .navbar { border-radius: 8px; margin-bottom: 20px; }
      .navbar-brand { font-weight: 600; }
      .alert { border-radius: 8px; }
      .table { width: 100% !important; }
      .form-control { max-width: 100% !important; }
      .modal-dialog { max-width: 90% !important; }
      .col-md-12, .col-12 {
        padding-left: 0 !important;
        padding-right: 0 !important;
      }
      /* Подсветка активного пункта меню */
      .nav-item.active > .nav-link {
        background-color: rgba(255,255,255,0.1);
        border-radius: 4px;
      }
            /* Кнопки в одну строку */
      .list-buttons-column {
          white-space: nowrap !important;
          min-width: 80px;
      }

      .list-buttons-column .icon {
          display: inline-block !important;
          margin: 0 2px !important;
      }

      .list-buttons-column form {
          display: inline-block !important;
          margin: 0 !important;
      }
    </style>

    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="container-fluid">
      <!-- НАВИГАЦИЯ (динамическая) -->
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark" role="navigation">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#admin-navbar-collapse"
                aria-controls="admin-navbar-collapse" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="admin-navbar-collapse">
          <a class="navbar-brand" href="/admin">{{ admin_view.admin.name }}</a>
          <ul class="nav navbar-nav mr-auto">
            {% for item in admin_view.admin.menu() %}
              {% if item.is_accessible() %}
                <li class="nav-item{% if item.is_active(admin_view) %} active{% endif %}">
                  <a class="nav-link" href="{{ item.get_url() }}">{{ item.name }}</a>
                </li>
              {% endif %}
            {% endfor %}
          </ul>
        </div>
      </nav>

      <!-- ОСНОВНОЙ КОНТЕНТ -->
      <div class="row">
        <div class="col-12">
          {% block body %}{% endblock %}
        </div>
      </div>
    </div>

    <!-- Подключаем ЛОКАЛЬНЫЙ JS -->
    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
